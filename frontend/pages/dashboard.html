<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../css/dashboard.css" />
  </head>

  <body>
    <div class="container py-5">
      <h1 class="text-center mb-5 text-white">Welcome to Dashboard</h1>

      <div class="row g-4">
        <div class="col-md-6">
          <div class="card p-4 stat-card">
            <h5>Total Students</h5>
            <h2 id="totalStudents">0</h2>
          </div>
        </div>

        <div class="col-md-6">
          <div class="card p-4 stat-card">
            <h5>Average Grades</h5>
            <h2 id="avgGrade">0</h2>
          </div>
        </div>
      </div>

      <div class="row mt-5 g-3">
        <div class="col-md-4">
          <a href="./add_student.html" class="btn btn-success w-100 p-3">
            Add Student
          </a>
        </div>

        <div class="col-md-4">
          <a href="./students.html" class="btn btn-primary w-100 p-3">
            Students List
          </a>
        </div>

        <div class="col-md-4">
          <button class="btn btn-danger w-100 p-3" id="logoutBtn">Logout</button>
        </div>
      </div>
    </div>
    <script src="../js/dashboard.js"></script>
  </body>
</html>
