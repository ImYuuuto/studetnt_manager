<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../css/modifyStudent.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container">
        <a class="navbar-brand fw-bold" href="#">Modify Student</a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link active" href="./dashboard.html"> Dashboard </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="./students.html"> Students </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="./add_student.html"> Add Student </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-5">
          <div class="form-container">
            <h2 class="text-center mb-4">Add Student</h2>

            <form>
              <div class="mb-3">
                <label class="form-label">Nom</label>
                <input
                  type="text"
                  name="nom"
                  class="form-control"
                  placeholder="Enter your name"
                  id="nom"
                  required
                />
                <p class="Error hidden">name too short</p>
              </div>
              <div class="mb-3">
                <label class="form-label">Prenom</label>
                <input
                  type="text"
                  name="prenom"
                  class="form-control"
                  placeholder="Enter your first name"
                  id="prenom"
                  required
                />
                <p class="Error hidden">First name too short</p>
              </div>
              <div class="mb-3">
                <label class="form-label">Email: </label>
                <input
                  type="email"
                  name="email"
                  class="form-control"
                  placeholder="Ex: ahmed@gmail.com"
                  id="email"
                  required
                />
              </div>

              <div class="mb-3">
                <label class="form-label">Filiere</label>
                <input
                  type="text"
                  name="filiere"
                  class="form-control"
                  placeholder="Enter your major"
                  id="filiere"
                  required
                />
                <p class="Error hidden">Invalid Major</p>
              </div>

              <div class="mb-3">
                <label class="form-label">Moyenne</label>
                <input
                  type="number"
                  step="0.1"
                  name="moyenne"
                  class="form-control"
                  placeholder="Enter the Average"
                  id="moyenne"
                  required
                />
                <p class="Error hidden">invalid Value</p>
              </div>

              <button type="submit" name="submit" class="btn btn-primary w-100" id="modifyBtn">
                Modify
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
